# Build + lint on every push/PR (no Supabase secrets required).
# See docs/deployment.md
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Tailwind class names)
        run: npm run lint:tailwind

      - name: Production build
        env:
          VITE_SUPABASE_URL: https://ci-build-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiJ9.ci-build-placeholder-not-a-secret
        run: npm run build
