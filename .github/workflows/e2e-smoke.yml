# Supabase schema/RPC smoke test (no browser). Requires VITE_* secrets.
# Build-only CI (no secrets): .github/workflows/ci.yml — see docs/deployment.md
name: E2E smoke (Supabase)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Tailwind class names
        run: npm run lint:tailwind

      - name: Create .env.local for smoke script
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Add repository secrets VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY (see docs/deployment.md)"
            exit 1
          fi
          cat > .env.local << EOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          EOF

      - name: Run e2e:smoke
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run e2e:smoke
