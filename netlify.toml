# BikriKhata — Netlify (monorepo: app lives in /app)
# Full guide: docs/deployment.md

[build]
  base    = "app"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router SPA — deep links must serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
